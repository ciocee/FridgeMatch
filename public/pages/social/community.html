<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeMatch: Community</title>
    
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/social.css">
    
    <script src="../../js/utils.js" defer></script>
    <script src="../../js/social.js" defer></script>
</head>
<body class="dashboard-body">
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>
    
    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>

    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar"> 
            <div class="sidebar-section">
                <h1 class="brand">FridgeMatch</h1>
                <nav class="nav-menu">
                    <ul>
                        <li><a href="../dashboard/index.html">Homepage</a></li>
                        <li><a href="../fridge/index.html">Fridge</a></li>
                        <li><a href="../groceries/index.html">Grocery list</a></li>
                        <li><a href="favourites.html">Your favourites</a></li>
                    </ul>
                </nav>
            </div>        

            <div class="sidebar-section social">
                <br>
                <h3>Social</h3>
                <nav class="nav-menu" id="social-nav-content">
                    <ul>
                        <li><a href="profile.html">Your profile</a></li>
                        <li><a href="add-recipe.html">Add recipe</a></li>
                        <li><a href="#" class="active">Community feed</a></li>
                    </ul>
                </nav>
            </div>

            <div id="auth-button-container" style="margin-top: auto;">
                <button class="logout-btn" id="logout-btn" onclick="handleLogout()">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="social-header">
                <h1>Community Feed</h1>
                <button class="add-item-btn" onclick="openRecipeModal()">+ Share recipe</button>
            </header>
            
             <section id="recipe-feed" class="recipe-feed-grid">
                 <p class="loading-msg">Loading recipes from the community...</p>
             </section>
        </main>
    </div>    
    
    <div id="recipeModal" class="modal-backdrop" onclick="closeRecipeModal(event)">
        <div class="modal">
            <div class="modal-header">
                <h2>Share your recipe</h2>
                <button class="modal-close" onclick="closeRecipeModal()">✕</button>
            </div>
            <form id="upload-recipe-form" enctype="multipart/form-data">
                <div class="modal-body">                    
                    <div class="form-group">
                        <label for="recipe-title">Recipe title</label>
                        <input type="text" id="recipe-title" name="title" placeholder="Give it a name" required>
                    </div>

                    <div class="form-group">
                        <label for="recipe-img">Photo</label>
                        <input type="file" id="recipe-img" name="img" accept="image/*" required>
                    </div>

                    <div class="form-group">
                        <label for="ingredient-input">Ingredients from your fridge</label>
                        <input type="text" id="ingredient-input" list="fridge-ingredients-list" placeholder="Search in your fridge...">
                        <datalist id="fridge-ingredients-list"></datalist>
                        <div id="selected-ingredients-tags" class="tag-container">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeRecipeModal()">Cancel</button>
                    <button type="submit" class="btn-add">Publish recipe</button>
                </div>     
            </form>                       
        </div>
    </div>
</body>
</html>
