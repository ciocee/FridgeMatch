<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeMatch: Post details</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/social.css">
    <link rel="stylesheet" href="../../css/dashboard.css">

    <script src="../../js/utils.js" defer></script>
    <script src="../../js/social.js" defer></script>
    <script src="../../js/social-detail.js" defer></script>
    
</head>
<body class="dashboard-body">
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <h1 class="brand">FridgeMatch</h1>
                <nav class="nav-menu">
                    <ul>
                        <li><a href="../dashboard">Homepage</a></li> 
                        <li><a href="../fridge">Fridge</a></li>
                        <li><a href="../groceries">Grocery list</a></li>
                        <li><a href="../social">Your favourites</a></li> 
                    </ul>
                </nav>
            </div>

            <div class="sidebar-section social">
                <br>
                <h3>Social</h3>
                <nav class="nav-menu" id="social-nav-content">
                    <ul>
                        <li><a href="../social/profile.html">Your profile</a></li>
                        <li><a href="../social/add-recipe.html">Add recipe</a></li>
                        <li><a href="../social/index.html" class="active">Community feed</a></li>
                    </ul>
                </nav>
            </div>

            <div id="auth-button-container" style="margin-top: auto;">
                <button class="logout-btn" id="logout-btn" onclick="handleLogout()">Logout</button>
            </div>
        </aside>
        
        <main class="main-content">
            <button onclick="history.back()" class="btn-cancel">← Back</button>
            
            <section class="card" style="max-width:700px; margin: 2rem auto; padding: 2.5rem;">
                <h1 id="det-title" style="color:var(--primary-green); font-size: 2.2rem; margin-bottom: 0.5rem;"></h1>
                <p id="det-author" style="color:var(--gray-medium); font-weight: 600;"></p>
                <div id="det-delete-container" style="margin-top: 10px;"></div>
                
                <div class="det-img-wrapper" style="margin: 1.5rem 0; border-radius: 20px; overflow: hidden; height: 350px;">
                    <img id="det-image" src="" style="width: 100%; height: 100%; object-fit: cover;">
                </div>

                <div class="det-info">
                    <h3 style="margin-bottom: 1rem; border-bottom: 1px solid var(--gray-light); padding-bottom: 0.5rem;">Ingredients Used:</h3>
                    <div id="det-ingredients" class="tag-container">
                        <!-- tag messi da js -->
                    </div>
                </div>
                
                <!-- parte per la descrizione del post-->
                <div class = "det-description-box">
                    <p id="det-description"></p>
                </div>

                <!-- sezione commenti-->
                <section class="comments-section">
                    <h3>Comments</h3>
                    <div class="comments-container" id="comments-list">
                        <!-- popolato da js-->
                    </div>

                    <!-- aggiunta nuovo commento-->
                    <div class="add-comment-form">
                        <input type="text" id="comment-text" placeholder="Add a comment" maxlength="900">
                        <button onclick="postComment()" class="btn-add">Post</button>
                    </div>                        
                </section>

                <div style="margin-top: 2rem; display: flex; align-items: center; gap: 10px;">
                    <button id="det-like-btn" class="like-btn" style="font-size: 1.5rem;">❤️ <span>0</span></button>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
