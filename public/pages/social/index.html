<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeMatch: Community</title>
    
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/social.css">
    <link rel="stylesheet" href="../../css/dashboard.css">
    
    <script src="../../js/utils.js" defer></script>
    <script src="../../js/social.js" defer></script>
</head>    
<body class="dashboard-body">
    <!-- overlay e sidebar-->
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>

    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar"> 
            <div class="sidebar-section">
                <h1 class="brand">FridgeMatch</h1>
                <nav class="nav-menu">
                    <ul>
                        <li><a href="../dashboard">Homepage</a></li>
                        <li><a href="../fridge">Fridge</a></li>
                        <li><a href="../groceries">Grocery list</a></li>
                        <li><a href="../favourites">Your favourites</a></li>
                    </ul>
                </nav>
            </div>        
            
            <div class="sidebar-section social">
                <br>
                <h3>Social</h3>
                <nav class="nav-menu" id="social-nav-content">
                    <ul>
                        <li><a href="profile.html">Your profile</a></li>
                        <li><a href="add-recipe.html">Add recipe</a></li>
                        <li><a href="#" class="active">Community feed</a></li>
                    </ul>
                </nav>
            </div>

            <div id="auth-button-container" style="margin-top: auto;">
                <button class="logout-btn" id="logout-btn" onclick="handleLogout()">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <!-- barra di ricerca per la community -->
             <header class="search-bar">
                <div class="search-wrapper">
                    <input type="text" placeholder="Search recipes or creators..." id="social-search-input">
                    <button type="button" class="search-btn" onclick="executeSocialSearch()">search</button>
                </div>
             </header>

            <header class="social-header">
                <h1>Community feed</h1>
                <button class="add-item-btn" onclick="location.href='./add-recipe.html'">+ Share your recipe</button>                
            </header>

<!-- UN ATTIMO -->            
           <hr class="section-divider">
            
           <!-- area risultati prodotti dalla ricerca -->
            <div id="search-results-area" class="hidden">
                
                <!-- sezione utenti -->
                <section id="search-users-section" class="hidden">
                    <h2 class="section-title">Users found</h2>
                    <div id="search-users-grid" class="users-grid"></div>
                </section>

                <!-- sezione ricette -->
                <section id="search-recipes-section" class="hidden">
                    <h2 class="section-title">Community recipes found</h2>
                    <div id="search-recipes-grid" class="recipes-feed-grid"></div>
                </section>
                <hr class="section-divider">
            </div>
            
            <!-- sezione ricette da creatori starred -->
            <section id="starred-feed-section" class="recipes-section hidden">
                <div class="section-header">
                    <h2>Posts from creators you starred</h2>
                </div>
                <div id="starred-recipe-feed" class="recipe-feed-grid"></div>
            </section>

            <hr id="feed-divider" class="section-divider hidden">

            <!-- sezione ricette generali -->
            <section id="main-feed-section" class="recipes-section hidden">
                <div class="section-header">
                    <h2>Recent Recipes</h2>
                </div>
                <div id="recipe-feed" class="recipe-feed-grid"></div>
            </section>

<!-- UN ATTIMO -->            

            
            

        </main>
    </div>    

    <!-- modal conferma rimozione stella -->
    <div class="modal-backdrop" id="unstarModalBackdrop" onclick="closeUnstarModal(event)">
        <div class="modal modal-small">
            <div class="modal-header">
                <h2>Remove star</h2>
                <button class="modal-close" onclick="closeUnstarModal()">✕</button>
            </div>
            <div class="modal-body">
                <p id="unstarModalText">Remove this creator from your starred list?</p>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeUnstarModal()">Cancel</button>
                <button class="btn-delete" onclick="confirmUnstar()">Remove</button>
            </div>
        </div>
    </div> 
</body>
</html>
