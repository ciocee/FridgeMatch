<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeMatch: Login</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/auth.css">

<script>
  var vConsole = new window.VConsole();
</script>
</head>
<body class="auth-body">
    <div class="page">
        <div class="brand">FridgeMatch</div>

        <div class="fridge-scene">

            <div class="magnet lime" aria-hidden="true">🍋‍🟩</div>
            <div class="magnet smile" aria-hidden="true">😊</div>
            <div class="magnet note" aria-hidden="true">FRESH<br>SNACKS</div>

            <div class="freezer">
                <div class="switch-bar" id="switchBar">
                    <div class="pill"></div>
                    <button class="tab active" onclick="switchForm('login')">Login</button>
                    <button class="tab" onclick="switchForm('register')">Sign Up</button>
                </div>
            </div>

            <div class="fridge-body card">

                <div class="shelf-top" aria-hidden="true">
                    <div class="food-item f1">🧀</div> <div class="jar j2"></div>         <div class="food-item f3">🥬</div> <div class="jar j4"></div>         <div class="food-item f5">🥚</div> </div>

                <div class="form-head">
                    <h2 id="formTitle">Welcome back!</h2>
                    <p id="formDesc">Open the fridge, your snacks are waiting</p>
                    <p id="errorMsg" class="error-msg" style="display:none"></p>
                </div>

                <form class="fields" id="mainForm" onsubmit="handleSubmit(event)">
                    <div class="input-wrap" id="usernameField" style="display:none">
                        <input type="text" placeholder="Username" id="username" name="username">
                    </div>
                    <div class="input-wrap">
                        <input type="text" placeholder="Email or Username" id="email" name="email" required>
                    </div>
                    <div class="input-wrap">
                        <input type="password" placeholder="Password" id="password" name="password" minlength="8" required>
                        <button type="button" class="eye-btn" onclick="togglePwd('password', this)">👁</button>
                    </div>
                    <div class="input-wrap hidden" id="confirmField">
                        <input type="password" placeholder="Confirm Password" id="confirmPwd" name="confirmPwd" minlength="8">
                        <button type="button" class="eye-btn" onclick="togglePwd('confirmPwd', this)">👁</button>
                    </div>
                    <label class="remember" id="rememberRow">
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                    <button type="submit" class="submit-btn" id="submitBtn">Login</button>

                    <div class="guest-access">
                        <p>
                            Don't want to sync data?
                            <span onclick="continueAsGuest()" class="guest-link">Continue as Guest</span>
                        </p>
                    </div>
                </form>

                <div class="footer-link" id="footerLink">
                    Don't have an account? <span onclick="switchForm('register')">Sign up</span>
                </div>
            </div>

            <div class="fridge-feet" aria-hidden="true">
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <script src="../../js/auth.js"></script>
</body>
</html>
